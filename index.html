<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎖️ The War Room — Big Matt</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #e5e5e5; font-family: 'DM Sans','Segoe UI',sans-serif; font-size: 16px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.app { max-width: 1100px; margin: 0 auto; padding: 20px 16px; min-height: 100vh; }
h1 { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 44px; letter-spacing: 4px; color: #f59e0b; text-align: center; }
.subtitle { text-align: center; color: #666; font-size: 14px; margin: 4px 0 24px; }
hr { border: none; border-top: 2px solid #1f1f1f; margin: 8px 0 20px; }
.sync { display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:2px 8px; border-radius:10px; }
.sync.ok { background:#0a2a0a; color:#4ade80; border:1px solid #166534; }
.sync.saving { background:#1a1a0a; color:#fbbf24; border:1px solid #854d0e; }
.sync.err { background:#2a0a0a; color:#f87171; border:1px solid #991b1b; }
.save-btn { margin-left:14px; background:#14532d; color:#4ade80; border:1px solid #16a34a; border-radius:4px; padding:2px 10px; font-size:12px; cursor:pointer; font-weight:700; }

/* TOP 3 */
.top3 { background:linear-gradient(135deg,#1a0f00,#0d0d0d); border:1px solid #92400e; border-radius:10px; padding:16px; margin-bottom:20px; }
.section-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:22px; letter-spacing:2px; margin-bottom:12px; }
.top3-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; padding:8px 12px; background:#0d0d0d; border-radius:6px; border:1px solid #292929; }
.top3-row.drag-ghost { opacity:0.25; }

/* BATTLE PLAN */
.battle { background:linear-gradient(135deg,#0a0a1a,#0d0d0d); border:1px solid #1e3a5f; border-radius:10px; padding:16px; margin-bottom:20px; }
.battle-row { display:flex; align-items:center; gap:10px; padding:8px 10px; margin-bottom:2px; border-radius:6px; background:#0d0d0d; border:1px solid #1e1e1e; }
.battle-row.done { background:#0a1a0a; border-color:#166534; opacity:0.5; }
.battle-row.drag-ghost { opacity:0.25; }

/* TIME BLOCKS */
.timeblock { background:#0a0a0a; border:1px solid #374151; border-radius:10px; padding:16px; margin-bottom:20px; }
.time-row { display:flex; align-items:center; gap:12px; padding:8px 12px; margin-bottom:6px; background:#0d0d0d; border-radius:6px; border:1px solid #1f1f1f; }
.time-row.drag-ghost { opacity:0.25; }
.time-label { min-width:70px; color:#a78bfa; font-weight:700; font-size:13px; font-family:monospace; }

/* DRAG HANDLE */
.drag-handle { color:#555; font-size:18px; cursor:grab; padding:0 4px; flex-shrink:0; user-select:none; font-family:sans-serif; }
.drag-handle:hover { color:#aaa; }
.drag-handle:active { cursor:grabbing; }

/* SECTIONS */
.section { margin-bottom:4px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin:20px 0 8px; cursor:pointer; }
.section-label { font-family:'Bebas Neue',Impact,sans-serif; font-size:22px; letter-spacing:1px; }
.section-total { font-size:13px; background:#1c1400; border:1px solid #854d0e; border-radius:6px; padding:2px 10px; color:#fbbf24; font-weight:700; }
.chevron { color:#555; font-size:13px; }

/* TABLE */
table { width:100%; border-collapse:collapse; font-size:15px; }
thead tr { background:#111; border-bottom:1px solid #333; }
th { padding:7px 10px; text-align:left; color:#888; font-weight:600; font-size:12px; white-space:nowrap; }
th.drag-col { width:28px; }
th.del-col { width:28px; }
tbody tr:nth-child(even) { background:#111; }
tbody tr:nth-child(odd) { background:#0d0d0d; }
tbody tr.drag-ghost { opacity:0.25; }
td { padding:8px 10px; vertical-align:middle; word-break:break-word; overflow-wrap:break-word; }
td.comm { color:#4ade80; font-weight:700; }
td.flag-cell { font-size:20px; }

/* EDITABLE — invisible until hover/focus */
.editable {
  display:inline-block; min-width:20px; min-height:18px;
  border-radius:3px; padding:2px 4px;
  cursor:text; outline:none;
  border:1px solid transparent; background:transparent;
  white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word;
}
.editable:hover { background:#1a1a1a; border-color:#444; }
.editable:focus { background:#1c1c1c; border-color:#f59e0b; }

/* EMOJI BTN */
.emoji-btn {
  background:none; border:1px solid transparent;
  cursor:pointer; padding:1px 3px; border-radius:4px;
  font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
  font-size:20px; line-height:1.2;
}
.emoji-btn:hover { background:#222; border-color:#555; }

/* EMOJI DROPDOWN */
#emoji-drop {
  position:fixed; z-index:99999;
  background:#1e1e1e; border:1px solid #555; border-radius:8px;
  padding:8px; display:grid; grid-template-columns:repeat(5,1fr); gap:4px;
  min-width:180px; box-shadow:0 12px 40px rgba(0,0,0,0.9);
  font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
}
#emoji-drop .eopt {
  font-size:22px; padding:5px; border-radius:4px;
  cursor:pointer; text-align:center;
}
#emoji-drop .eopt:hover { background:#333; }

/* BALL SELECT */
select.ball-select { background:#1a1a1a; color:#e5e5e5; border:1px solid #333; border-radius:4px; padding:2px 4px; font-size:13px; cursor:pointer; }

/* BUTTONS */
.add-btn { background:transparent; border-radius:5px; padding:4px 12px; font-size:13px; cursor:pointer; font-weight:700; }
.del-btn { background:transparent; color:#444; border:none; cursor:pointer; font-size:15px; padding:0 2px; }
.del-btn:hover { color:#f87171; }
.check { font-size:18px; cursor:pointer; min-width:24px; flex-shrink:0; user-select:none; font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif; }

/* PIPELINE */
.pipeline { background:#0a0a0a; border:1px solid #292929; border-radius:10px; padding:16px; margin-top:24px; }
.pipeline-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #1a1a1a; font-size:15px; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:#111; border-radius:12px; padding:24px; width:100%; max-width:500px; }
.modal-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:24px; letter-spacing:2px; margin-bottom:16px; }
.modal label { font-size:12px; color:#888; margin-bottom:3px; text-transform:uppercase; display:block; }
.modal input, .modal select { background:#1a1a1a; color:#e5e5e5; border:1px solid #333; border-radius:4px; padding:5px 8px; width:100%; font-size:15px; outline:none; font-family:inherit; margin-bottom:10px; }
.modal-btns { display:flex; gap:10px; margin-top:16px; }
.modal-btns button { flex:1; border:none; border-radius:6px; padding:10px 0; font-weight:700; cursor:pointer; font-size:15px; }
.btn-cancel { background:#222; color:#888; border:1px solid #333 !important; }

/* ACTION MODAL for battle plan checkoff */
.action-modal { background:#111; border-radius:12px; padding:24px; width:100%; max-width:440px; border:1px solid #3b82f6; }
.action-modal-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:22px; letter-spacing:2px; color:#60a5fa; margin-bottom:8px; }
.action-modal-task { font-size:14px; color:#aaa; margin-bottom:20px; line-height:1.5; border-left:3px solid #3b82f6; padding-left:10px; }
.action-choice-btn { width:100%; border:none; border-radius:8px; padding:14px 16px; font-weight:700; cursor:pointer; font-size:15px; margin-bottom:10px; text-align:left; display:flex; align-items:center; gap:10px; }
.choice-complete { background:#14532d; color:#4ade80; border:1px solid #16a34a !important; }
.choice-complete:hover { background:#166534; }
.choice-followup { background:#1e1b4b; color:#a78bfa; border:1px solid #6d28d9 !important; }
.choice-followup:hover { background:#2e1b6b; }
.choice-cancel { background:#1a1a1a; color:#666; border:1px solid #333 !important; }
.choice-cancel:hover { background:#222; }

/* COMPLETED LOG */
.completed-log { margin-top:24px; background:#080808; border:1px solid #1f2937; border-radius:10px; overflow:hidden; }
.completed-log-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; background:#0d0d0d; border-bottom:1px solid #1f2937; }
.completed-log-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:20px; letter-spacing:2px; color:#4ade80; }
.completed-log-count { font-size:12px; background:#0a2a0a; border:1px solid #166534; border-radius:6px; padding:2px 10px; color:#4ade80; font-weight:700; }
.completed-log-body { padding:12px 16px; }
.completed-group { margin-bottom:16px; }
.completed-group-date { font-size:12px; color:#555; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #1a1a1a; }
.completed-item { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; margin-bottom:4px; background:#0d0d0d; border-radius:6px; border:1px solid #1a1a1a; }
.completed-item-text { flex:1; font-size:14px; color:#666; text-decoration:line-through; line-height:1.4; word-break:break-word; }
.completed-item-time { font-size:11px; color:#444; white-space:nowrap; flex-shrink:0; margin-top:2px; }
.completed-undo { background:transparent; border:1px solid #333; color:#888; border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; flex-shrink:0; }
.completed-undo:hover { border-color:#f59e0b; color:#f59e0b; }
.completed-empty { font-size:14px; color:#333; text-align:center; padding:20px; }

.win-log { margin-top:24px; background:#0a1a0a; border:1px solid #166534; border-radius:10px; padding:16px; }
.win-row { font-size:14px; color:#555; text-decoration:line-through; padding:5px 0; border-bottom:1px solid #111; }
.footer { text-align:center; margin-top:32px; color:#333; font-size:12px; }

/* MOBILE FIX */
@media (max-width: 640px) {
  table { font-size: 14px; }
  td, th { padding: 6px 6px; }
  .battle-row { flex-wrap: wrap; }
  .time-label { min-width: 55px; font-size: 12px; }
  .top3-row { flex-wrap: wrap; }
  h1 { font-size: 34px; }
  .section-label { font-size: 18px; }
  .section-title { font-size: 18px; }
  td { word-break: break-word; overflow-wrap: break-word; hyphens: auto; }
  .editable { word-break: break-word; overflow-wrap: break-word; hyphens: auto; max-width: 100%; }
  select.ball-select { font-size: 12px; max-width: 80px; }
}
</style>
</head>
<body>
<div class="app">
  <h1>🎖️ THE WAR ROOM</h1>
  <div class="subtitle">
    <span id="sync-status" class="sync ok">● Live</span>
    &nbsp;|&nbsp; Big Matt &nbsp;|&nbsp; 75% Split &nbsp;|&nbsp;
    <span id="last-updated">Updated: 3/11/26</span>
    <button class="save-btn" onclick="forceSave()">💾 Save</button>
  </div>
  <hr>
  <div id="root"></div>
</div>

<script>
'use strict';

// ── SUPABASE ──────────────────────────────────────────────────────────────────
var SUPABASE_URL = 'https://mtkyyaorvensylrfbhxv.supabase.co';
var SUPABASE_KEY = 'sb_publishable_qGuGE-6ExwYvFC01eBvV_g_ewDYx77M';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── EMOJI LIST ────────────────────────────────────────────────────────────────
var EMOJIS = ['🚨','🔥','👑','💰','⚡','📋','📞','📧','⏳','✅','❓','📝','🔄','📣','📊','⚖️','🏆','💸','⚠️','🎯'];

// ── GLOBALS ───────────────────────────────────────────────────────────────────
var S = null;
var collapsed = {};
var completedLog = []; // [{id, action, completedAt (ISO), source:'complete'|'rollover'}]
var completedLogCollapsed = false;
var saveTimer = null;
var addModalKey = null;
var actionModalItem = null; // {id, action} — battle item awaiting user choice
var emojiTarget = null;
var epRegistry = {};
var ecSave = {};
var drag = null;

// ── TIME HELPERS ──────────────────────────────────────────────────────────────
function parseTime12(str) {
  if (!str) return null;
  var m = str.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return null;
  var h = parseInt(m[1]), min = parseInt(m[2]), ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}
function nowMinutes() {
  var n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}
function todayStr() {
  var d = new Date();
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2);
}
function formatTime(iso) {
  var d = new Date(iso);
  var h = d.getHours(), min = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (min < 10 ? '0'+min : min) + ' ' + ampm;
}
function formatDateGroup(iso) {
  var d = new Date(iso);
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// ── AUTO-PURGE PAST TIME BLOCKS ───────────────────────────────────────────────
function autoPurgePastTimeBlocks() {
  if (!S || !S.timeBlocks) return;
  var now = nowMinutes();
  var before = S.timeBlocks.length;
  S.timeBlocks = S.timeBlocks.filter(function(t) {
    var tm = parseTime12(t.time);
    if (tm === null) return true; // keep if unparseable (like "—")
    return tm > now;
  });
  if (S.timeBlocks.length !== before) {
    renderOnly();
    scheduleSave();
  }
}

// ── BATTLE PLAN ROLLOVER ──────────────────────────────────────────────────────
// Unchecked items persist day to day automatically (they just stay).
// Done items from a previous day get cleared on load if lastBattleDate != today.
function handleDailyRollover() {
  if (!S) return;
  var today = todayStr();
  if (!S.lastBattleDate) { S.lastBattleDate = today; return; }
  if (S.lastBattleDate === today) return;
  // New day: clear done flags (unchecked items stay as-is, done items reset to undone for the new day)
  // Actually per spec: unchecked stay → become today's plan. Done items stay in log already.
  // Remove done items from battlePlan (they were already logged), keep undone ones.
  S.battlePlan = S.battlePlan.filter(function(b) { return !b.done; });
  // Also add any queued follow-up items
  if (S.tomorrowPlan && S.tomorrowPlan.length) {
    S.tomorrowPlan.forEach(function(item) {
      item.done = false;
      S.battlePlan.push(item);
    });
    S.tomorrowPlan = [];
  }
  S.lastBattleDate = today;
  scheduleSave();
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function loadFromCloud() {
  try {
    var r = await sb.from('warroom').select('*').eq('id','bigmatt').single();
    if (r.error && r.error.code !== 'PGRST116') throw r.error;
    if (r.data && r.data.payload) {
      S = r.data.payload;
      S.top3.forEach(function(t,i){ if(!t.id) t.id = i+1; });
      if (!S.tomorrowPlan) S.tomorrowPlan = [];
      if (!S.lastBattleDate) S.lastBattleDate = todayStr();
      setSyncStatus('ok');
    } else {
      await saveToCloud();
    }
    // Load completed log from cloud if stored
    if (S.completedLog) completedLog = S.completedLog;
  } catch(e) {
    console.warn(e); setSyncStatus('err');
  }
  handleDailyRollover();
  renderOnly();
  // Start auto-purge interval (every 60 seconds)
  setInterval(autoPurgePastTimeBlocks, 60000);
}
async function saveToCloud() {
  setSyncStatus('saving');
  S.completedLog = completedLog;
  try {
    var r = await sb.from('warroom').upsert({id:'bigmatt', payload:S, updated_at:new Date().toISOString()});
    if (r.error) throw r.error;
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); }
}
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToCloud, 1200); }
function forceSave() { saveToCloud(); }
function setSyncStatus(s) {
  var el = document.getElementById('sync-status'); if (!el) return;
  el.className = 'sync '+s;
  el.textContent = s==='ok' ? '● Live' : s==='saving' ? '⟳ Saving…' : '✕ Offline';
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function uid() { return Date.now() + Math.floor(Math.random()*9999); }
function upd(fn) { fn(S); renderOnly(); scheduleSave(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── EDITABLE CELL ─────────────────────────────────────────────────────────────
function ec(stableId, val, color, onSave) {
  ecSave[stableId] = onSave;
  return '<span class="editable" contenteditable="true" style="color:'+color+'" data-ecid="'+stableId+'"'+
    ' onblur="ecBlur(this)"'+
    ' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();this.blur();}"'+
    ' onclick="event.stopPropagation()">'+esc(val)+'</span>';
}
function ecBlur(el) {
  var id = el.dataset.ecid;
  if (ecSave[id]) ecSave[id](el.innerText.trim());
}

// ── EMOJI PICKER ──────────────────────────────────────────────────────────────
function ep(stableId, currentVal, onSelect) {
  epRegistry[stableId] = onSelect;
  return '<button class="emoji-btn" onclick="epToggle(\''+stableId+'\',event)">'+esc(currentVal||'➕')+'</button>';
}
function epToggle(id, e) {
  e.stopPropagation();
  var existing = document.getElementById('emoji-drop');
  if (existing && emojiTarget && emojiTarget.id === id) { existing.remove(); emojiTarget = null; return; }
  if (existing) existing.remove();
  var btn = e.currentTarget;
  var rect = btn.getBoundingClientRect();
  emojiTarget = {id:id, x:rect.left, y:rect.bottom+6};
  var d = document.createElement('div');
  d.id = 'emoji-drop';
  d.style.left = rect.left+'px';
  d.style.top = (rect.bottom+6)+'px';
  d.onclick = function(ev){ ev.stopPropagation(); };
  d.innerHTML = EMOJIS.map(function(em){
    return '<div class="eopt" onclick="epPick(\''+em+'\',event)">'+em+'</div>';
  }).join('');
  document.body.appendChild(d);
}
function epPick(emoji, e) {
  e.stopPropagation();
  if (emojiTarget && epRegistry[emojiTarget.id]) epRegistry[emojiTarget.id](emoji);
  var d = document.getElementById('emoji-drop');
  if (d) d.remove();
  emojiTarget = null;
}
document.addEventListener('click', function() {
  var d = document.getElementById('emoji-drop');
  if (d) { d.remove(); emojiTarget = null; }
});

// ── DRAG ──────────────────────────────────────────────────────────────────────
function getArr(lt, key) {
  if (lt==='top3') return S.top3;
  if (lt==='battle') return S.battlePlan;
  if (lt==='timeblock') return S.timeBlocks;
  return S.sections[key].rows;
}
function startDrag(e, lt, key, idx) {
  e.preventDefault(); e.stopPropagation();
  var arr = getArr(lt, key);
  var handle = e.currentTarget;
  var row = handle.closest('[data-drag-row]');
  if (!row) return;
  var rect = row.getBoundingClientRect();
  var clone = row.cloneNode(true);
  clone.style.cssText = 'position:fixed;pointer-events:none;z-index:99998;width:'+rect.width+'px;'+
    'left:'+rect.left+'px;top:'+rect.top+'px;margin:0;opacity:0.9;'+
    'box-shadow:0 8px 32px rgba(0,0,0,0.8);border-radius:6px;background:#1a1a2a;';
  document.body.appendChild(clone);
  row.classList.add('drag-ghost');
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  drag = { lt:lt, key:key, curIdx:idx, arr:arr, clone:clone, ghostRow:row, ox:cx-rect.left, oy:cy-rect.top };
  document.addEventListener('mousemove', onDragMove, {passive:false});
  document.addEventListener('mouseup', onDragEnd);
  document.addEventListener('touchmove', onDragMove, {passive:false});
  document.addEventListener('touchend', onDragEnd);
}
function onDragMove(e) {
  if (!drag) return;
  e.preventDefault();
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  drag.clone.style.left = (cx - drag.ox)+'px';
  drag.clone.style.top  = (cy - drag.oy)+'px';
  drag.clone.style.display = 'none';
  var el = document.elementFromPoint(cx, cy);
  drag.clone.style.display = '';
  if (!el) return;
  var row = el.closest('[data-drag-row][data-drag-lt="'+drag.lt+'"][data-drag-key="'+drag.key+'"]');
  if (!row) return;
  var hoverIdx = parseInt(row.dataset.dragIdx);
  if (isNaN(hoverIdx) || hoverIdx === drag.curIdx) return;
  var item = drag.arr.splice(drag.curIdx, 1)[0];
  drag.arr.splice(hoverIdx, 0, item);
  drag.curIdx = hoverIdx;
  renderOnly();
  var newRow = document.querySelector('[data-drag-row][data-drag-lt="'+drag.lt+'"][data-drag-key="'+drag.key+'"][data-drag-idx="'+drag.curIdx+'"]');
  if (newRow) newRow.classList.add('drag-ghost');
}
function onDragEnd() {
  if (!drag) return;
  drag.clone.remove();
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  document.removeEventListener('touchmove', onDragMove);
  document.removeEventListener('touchend', onDragEnd);
  drag = null;
  renderOnly();
  scheduleSave();
}

// ── BATTLE PLAN TOGGLE (opens action modal) ───────────────────────────────────
function toggleBattle(id) {
  var item = S.battlePlan.find(function(b){ return b.id === id; });
  if (!item) return;
  if (item.done) {
    // Unchecking — just toggle back
    upd(function(s){ var b=s.battlePlan.find(function(x){return x.id===id;}); if(b)b.done=false; });
    return;
  }
  // Checking — show action modal
  actionModalItem = {id: id, action: item.action};
  renderOnly();
}

function chooseComplete() {
  if (!actionModalItem) return;
  var id = actionModalItem.id;
  var action = actionModalItem.action;
  // Log it
  completedLog.push({ id: uid(), action: action, completedAt: new Date().toISOString() });
  // Remove from battlePlan
  upd(function(s){ s.battlePlan = s.battlePlan.filter(function(x){ return x.id !== id; }); });
  actionModalItem = null;
  renderOnly();
  scheduleSave();
}

function chooseFollowUp() {
  if (!actionModalItem) return;
  var id = actionModalItem.id;
  var action = actionModalItem.action;
  if (!S.tomorrowPlan) S.tomorrowPlan = [];
  S.tomorrowPlan.push({ id: uid(), done: false, action: '🔁 ' + action, flag: '🔄 FOLLOW-UP', ball: 'me' });
  // Remove from today's battlePlan
  upd(function(s){ s.battlePlan = s.battlePlan.filter(function(x){ return x.id !== id; }); });
  actionModalItem = null;
  renderOnly();
  scheduleSave();
}

function cancelActionModal() {
  actionModalItem = null;
  renderOnly();
}

function undoCompleted(logId) {
  var entry = completedLog.find(function(x){ return x.id === logId; });
  if (!entry) return;
  // Restore to battle plan
  S.battlePlan.push({ id: uid(), done: false, action: entry.action, flag: '', ball: 'me' });
  completedLog = completedLog.filter(function(x){ return x.id !== logId; });
  renderOnly();
  scheduleSave();
}

// ── COMPLETED LOG ─────────────────────────────────────────────────────────────
function rCompletedLog() {
  var total = completedLog.length;
  var isOpen = !completedLogCollapsed;

  // Group by date
  var groups = {};
  var groupOrder = [];
  completedLog.slice().reverse().forEach(function(entry) {
    var dateKey = formatDateGroup(entry.completedAt);
    if (!groups[dateKey]) { groups[dateKey] = []; groupOrder.push(dateKey); }
    groups[dateKey].push(entry);
  });

  var bodyHtml = '';
  if (!total) {
    bodyHtml = '<div class="completed-empty">No completed tasks yet. Crush something. ✅</div>';
  } else {
    bodyHtml = groupOrder.map(function(dateKey) {
      var items = groups[dateKey].map(function(entry) {
        return '<div class="completed-item">'+
          '<div class="completed-item-text">✅ '+esc(entry.action)+'</div>'+
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">'+
            '<span class="completed-item-time">'+formatTime(entry.completedAt)+'</span>'+
            '<button class="completed-undo" onclick="undoCompleted('+entry.id+')">↩ Undo</button>'+
          '</div>'+
        '</div>';
      }).join('');
      return '<div class="completed-group">'+
        '<div class="completed-group-date">'+dateKey+'</div>'+
        items+
      '</div>';
    }).join('');
  }

  return '<div class="completed-log">'+
    '<div class="completed-log-header" onclick="completedLogCollapsed=!completedLogCollapsed;renderOnly()">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        '<span class="completed-log-title">✅ COMPLETED TASKS LOG</span>'+
        (total ? '<span class="completed-log-count">'+total+' total</span>' : '')+
      '</div>'+
      '<span class="chevron" style="color:#4ade80">'+(isOpen?'▼':'▶')+'</span>'+
    '</div>'+
    (isOpen ? '<div class="completed-log-body">'+bodyHtml+'</div>' : '')+
  '</div>';
}
