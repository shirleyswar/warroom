<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎖️ The War Room — Big Matt</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #e5e5e5; font-family: 'DM Sans','Segoe UI',sans-serif; font-size: 17px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.app { max-width: 1100px; margin: 0 auto; padding: 20px 16px; min-height: 100vh; }

/* HEADER */
.header-wrap { display:flex; align-items:center; justify-content:center; gap:18px; margin-bottom:6px; flex-wrap:wrap; }
.header-logo { height:52px; opacity:0.92; filter:drop-shadow(0 0 6px rgba(245,158,11,0.18)); }
h1 { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 46px; letter-spacing: 4px; color: #f59e0b; text-align: center; }
.subtitle { text-align: center; color: #666; font-size: 14px; margin: 4px 0 6px; }
.sr-tagline { text-align:center; font-size:11px; letter-spacing:3px; color:#3a3020; text-transform:uppercase; margin-bottom:18px; font-family:'DM Sans',sans-serif; }
hr { border: none; border-top: 2px solid #1f1f1f; margin: 8px 0 20px; }
.sync { display:inline-flex; align-items:center; gap:5px; font-size:12px; padding:2px 8px; border-radius:10px; }
.sync.ok { background:#0a2a0a; color:#4ade80; border:1px solid #166534; }
.sync.saving { background:#1a1a0a; color:#fbbf24; border:1px solid #854d0e; }
.sync.err { background:#2a0a0a; color:#f87171; border:1px solid #991b1b; }
.save-btn { margin-left:14px; background:#14532d; color:#4ade80; border:1px solid #16a34a; border-radius:4px; padding:2px 10px; font-size:12px; cursor:pointer; font-weight:700; }

/* TOP 3 */
.top3 { background:linear-gradient(135deg,#1a0f00,#0d0d0d); border:1px solid #92400e; border-radius:10px; padding:16px; margin-bottom:20px; }
.section-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:23px; letter-spacing:2px; margin-bottom:12px; }
.top3-row { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; padding:8px 12px; background:#0d0d0d; border-radius:6px; border:1px solid #292929; }
.top3-row.drag-ghost { opacity:0.25; }

/* BATTLE PLAN */
.battle { background:linear-gradient(135deg,#0a0a1a,#0d0d0d); border:1px solid #1e3a5f; border-radius:10px; padding:16px; margin-bottom:20px; }
.battle-row { display:flex; align-items:center; gap:10px; padding:9px 10px; margin-bottom:3px; border-radius:6px; background:#0d0d0d; border:1px solid #1e1e1e; }
.battle-row.done { background:#0a1a0a; border-color:#166534; opacity:0.5; }
.battle-row.drag-ghost { opacity:0.25; }

/* TIME BLOCKS */
.timeblock { background:#0a0a0a; border:1px solid #374151; border-radius:10px; padding:16px; margin-bottom:20px; }
.time-row { display:flex; align-items:center; gap:12px; padding:9px 12px; margin-bottom:6px; background:#0d0d0d; border-radius:6px; border:1px solid #1f1f1f; }
.time-row.drag-ghost { opacity:0.25; }
.time-label { min-width:72px; color:#a78bfa; font-weight:700; font-size:14px; font-family:monospace; }

/* DRAG */
.drag-handle { color:#555; font-size:18px; cursor:grab; padding:0 4px; flex-shrink:0; user-select:none; font-family:sans-serif; }
.drag-handle:hover { color:#aaa; }
.drag-handle:active { cursor:grabbing; }

/* SECTIONS */
.section { margin-bottom:4px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin:20px 0 8px; cursor:pointer; }
.section-label { font-family:'Bebas Neue',Impact,sans-serif; font-size:22px; letter-spacing:1px; }
.section-total { font-size:13px; background:#1c1400; border:1px solid #854d0e; border-radius:6px; padding:2px 10px; color:#fbbf24; font-weight:700; }
.chevron { color:#555; font-size:13px; }

/* TABLE */
table { width:100%; border-collapse:collapse; font-size:15px; }
thead tr { background:#111; border-bottom:1px solid #333; }
th { padding:7px 10px; text-align:left; color:#888; font-weight:600; font-size:12px; white-space:nowrap; }
th.drag-col { width:28px; }
th.del-col { width:28px; }
tbody tr:nth-child(even) { background:#111; }
tbody tr:nth-child(odd) { background:#0d0d0d; }
tbody tr.drag-ghost { opacity:0.25; }
td { padding:8px 10px; vertical-align:middle; word-break:break-word; overflow-wrap:break-word; }
td.comm { color:#4ade80; font-weight:700; white-space:nowrap; min-width:90px; }
td.comm .editable { white-space:nowrap; }
td.flag-cell { font-size:22px; }

/* EDITABLE */
.editable {
  display:inline-block; min-width:20px; min-height:18px;
  border-radius:3px; padding:2px 4px;
  cursor:text; outline:none;
  border:1px solid transparent; background:transparent;
  white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word;
}
.editable:hover { background:#1a1a1a; border-color:#444; }
.editable:focus { background:#1c1c1c; border-color:#f59e0b; }

/* EMOJI BTN */
.emoji-btn {
  background:none; border:1px solid transparent;
  cursor:pointer; padding:1px 3px; border-radius:4px;
  font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
  font-size:22px; line-height:1.2;
}
.emoji-btn:hover { background:#222; border-color:#555; }

/* EMOJI DROPDOWN */
#emoji-drop {
  position:fixed; z-index:99999;
  background:#1e1e1e; border:1px solid #555; border-radius:8px;
  padding:8px; display:grid; grid-template-columns:repeat(5,1fr); gap:4px;
  min-width:185px; box-shadow:0 12px 40px rgba(0,0,0,0.9);
  font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
}
#emoji-drop .eopt { font-size:22px; padding:5px; border-radius:4px; cursor:pointer; text-align:center; }
#emoji-drop .eopt:hover { background:#333; }

/* BALL SELECT */
select.ball-select { background:#1a1a1a; color:#e5e5e5; border:1px solid #333; border-radius:4px; padding:2px 5px; font-size:13px; cursor:pointer; }

/* BUTTONS */
.add-btn { background:transparent; border-radius:5px; padding:4px 12px; font-size:13px; cursor:pointer; font-weight:700; }
.del-btn { background:transparent; color:#444; border:none; cursor:pointer; font-size:15px; padding:0 2px; }
.del-btn:hover { color:#f87171; }
.check { font-size:20px; cursor:pointer; min-width:24px; flex-shrink:0; user-select:none; font-family:'Segoe UI Emoji','Apple Color Emoji',sans-serif; }
.bp-comm { font-size:13px; color:#4ade80; font-weight:700; white-space:nowrap; background:#0a2a0a; border:1px solid #166534; border-radius:4px; padding:1px 7px; cursor:text; margin:0 4px; }

/* PIPELINE */
.pipeline { background:#0a0a0a; border:1px solid #292929; border-radius:10px; padding:16px; margin-top:24px; }
.pipeline-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #1a1a1a; font-size:15px; }

/* ADD ROW MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:#111; border-radius:12px; padding:24px; width:100%; max-width:500px; }
.modal-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:24px; letter-spacing:2px; margin-bottom:16px; }
.modal label { font-size:12px; color:#888; margin-bottom:3px; text-transform:uppercase; display:block; }
.modal input, .modal select { background:#1a1a1a; color:#e5e5e5; border:1px solid #333; border-radius:4px; padding:5px 8px; width:100%; font-size:15px; outline:none; font-family:inherit; margin-bottom:10px; }
.modal-btns { display:flex; gap:10px; margin-top:16px; }
.modal-btns button { flex:1; border:none; border-radius:6px; padding:10px 0; font-weight:700; cursor:pointer; font-size:15px; }
.btn-cancel { background:#222; color:#888; border:1px solid #333 !important; }

/* ACTION MODAL */
.action-modal { background:#111; border-radius:12px; padding:24px; width:100%; max-width:460px; border:1px solid #3b82f6; }
.action-modal-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:24px; letter-spacing:2px; color:#60a5fa; margin-bottom:8px; }
.action-modal-task { font-size:14px; color:#aaa; margin-bottom:18px; line-height:1.5; border-left:3px solid #3b82f6; padding-left:10px; }
.action-choice-btn { width:100%; border:none; border-radius:8px; padding:14px 16px; font-weight:700; cursor:pointer; font-size:15px; margin-bottom:10px; text-align:left; display:flex; align-items:center; gap:12px; }
.choice-complete { background:#14532d; color:#4ade80; border:1px solid #16a34a !important; }
.choice-complete:hover { background:#166534; }
.choice-followup { background:#1e1b4b; color:#a78bfa; border:1px solid #6d28d9 !important; }
.choice-followup:hover { background:#2e1b6b; }
.choice-cancel { background:#1a1a1a; color:#666; border:1px solid #333 !important; }
.choice-cancel:hover { background:#222; }

/* FOLLOW-UP INPUT inside action modal */
.followup-input-wrap { margin-top:2px; margin-bottom:10px; }
.followup-input-wrap label { font-size:12px; color:#a78bfa; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; display:block; }
.followup-input-wrap input { background:#1a1a1a; color:#e5e5e5; border:1px solid #6d28d9; border-radius:6px; padding:8px 12px; width:100%; font-size:15px; outline:none; font-family:inherit; }
.followup-input-wrap input:focus { border-color:#a78bfa; }
.followup-confirm-btn { width:100%; background:#4c1d95; color:#a78bfa; border:1px solid #6d28d9; border-radius:8px; padding:12px; font-weight:700; font-size:15px; cursor:pointer; }
.followup-confirm-btn:hover { background:#5b21b6; }

/* TOMORROW QUEUE */
.tomorrow-queue { margin-top:12px; padding:10px 12px; background:#0a0a1a; border:1px dashed #374151; border-radius:6px; }
.tomorrow-queue-label { font-size:12px; color:#555; font-weight:700; letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
.tomorrow-queue-item { font-size:14px; color:#6b7280; padding:4px 0; display:flex; justify-content:space-between; align-items:center; }
.restore-btn { background:transparent; border:1px solid #374151; color:#6b7280; border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; flex-shrink:0; margin-left:8px; }
.restore-btn:hover { border-color:#f59e0b; color:#f59e0b; }

/* COMPLETED LOG */
.completed-log { margin-top:24px; background:#080808; border:1px solid #1f2937; border-radius:10px; overflow:hidden; }
.completed-log-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; cursor:pointer; background:#0d0d0d; border-bottom:1px solid #1f2937; }
.completed-log-title { font-family:'Bebas Neue',Impact,sans-serif; font-size:22px; letter-spacing:2px; color:#4ade80; }
.completed-log-count { font-size:12px; background:#0a2a0a; border:1px solid #166534; border-radius:6px; padding:2px 10px; color:#4ade80; font-weight:700; }
.completed-log-body { padding:12px 16px; }
.completed-group { margin-bottom:16px; }
.completed-group-date { font-size:12px; color:#555; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #1a1a1a; }
.completed-item { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; margin-bottom:4px; background:#0d0d0d; border-radius:6px; border:1px solid #1a1a1a; }
.completed-item-text { flex:1; font-size:14px; color:#555; text-decoration:line-through; line-height:1.4; word-break:break-word; }
.completed-item-time { font-size:11px; color:#444; white-space:nowrap; flex-shrink:0; margin-top:2px; }
.completed-undo { background:transparent; border:1px solid #333; color:#888; border-radius:4px; padding:2px 8px; font-size:11px; cursor:pointer; flex-shrink:0; margin-top:2px; }
.completed-undo:hover { border-color:#f59e0b; color:#f59e0b; }
.completed-empty { font-size:14px; color:#333; text-align:center; padding:24px; }

/* FOOTER BRANDING */
.footer { text-align:center; margin-top:32px; padding-top:20px; border-top:1px solid #141414; color:#2a2a2a; font-size:11px; }
.footer-logo { height:28px; opacity:0.18; margin-bottom:6px; }

/* MOBILE */
@media (max-width: 640px) {
  table { font-size: 13px; }
  td, th { padding: 5px 4px; }
  .time-label { min-width: 56px; font-size: 12px; }
  .top3-row { flex-wrap: wrap; }
  h1 { font-size: 32px; }
  .section-label { font-size: 17px; }
  .section-title { font-size: 17px; }
  td { word-break: normal; overflow-wrap: anywhere; hyphens: none; }
  .editable { word-break: normal; overflow-wrap: anywhere; hyphens: none; max-width: 100%; white-space: normal; }
  select.ball-select { font-size: 11px; max-width: 72px; }
  .header-logo { height:38px; }
  th { font-size: 10px; padding: 4px 3px; }
  .drag-handle { display:none; }
  td.comm { min-width: 60px; }
  .app { padding: 12px 8px; }
}
</style>
</head>

  S.sections.schedule.rows = S.sections.schedule.rows.filter(function(row){
    var d = parseScheduleDate(row.date, row.time);
    if(!d) return true; // can't parse = keep
    if(d > now) return true; // future = keep
    if(row.protect) {
      // Past + protected = show confirmation once, then keep for now
      if(!row._purgeNotified) {
        row._purgeNotified = true;
        toConfirm.push(row);
      }
      return true;
    }
    return false; // past + unprotected = purge
  });
  if(S.sections.schedule.rows.length !== before || toConfirm.length) {
    renderOnly(); scheduleSave();
    if(toConfirm.length) {
      var names = toConfirm.map(function(r){return r.event||r.date;}).join(', ');
      if(confirm('Past protected schedule item(s): ' + names + '\n\nMark as completed and remove?')) {
        toConfirm.forEach(function(row){
          completedLog.push({id:uid(), action:row.event||row.date, comm:'', completedAt:new Date().toISOString()});
          S.sections.schedule.rows = S.sections.schedule.rows.filter(function(r){return r.id!==row.id;});
        });
        renderOnly(); scheduleSave();
      }
    }
  }
}

// ── AUTO-PURGE PAST TIME BLOCKS ───────────────────────────────────────────────
function autoPurgePastTimeBlocks() {
  if (!S || !S.timeBlocks) return;
  var now = nowMinutes();
  var before = S.timeBlocks.length;
  S.timeBlocks = S.timeBlocks.filter(function(t) {
    var tm = parseTime12(t.time);
    return tm === null || tm > now;
  });
  if (S.timeBlocks.length !== before) { renderOnly(); scheduleSave(); }
}

// ── DAILY ROLLOVER ────────────────────────────────────────────────────────────
function handleDailyRollover() {
  if (!S) return;
  var today = todayStr();
  if (!S.lastBattleDate) { S.lastBattleDate = today; return; }
  if (S.lastBattleDate === today) return;
  // New day: remove done items (already logged), keep undone ones
  S.battlePlan = S.battlePlan.filter(function(b) { return !b.done; });
  // Promote tomorrow queue to today
  if (S.tomorrowPlan && S.tomorrowPlan.length) {
    S.tomorrowPlan.forEach(function(item) { item.done = false; S.battlePlan.push(item); });
    S.tomorrowPlan = [];
  }
  S.lastBattleDate = today;
  scheduleSave();
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function loadFromCloud() {
  try {
    var r = await sb.from('warroom').select('*').eq('id','bigmatt').single();
    if (r.error && r.error.code !== 'PGRST116') throw r.error;
    if (r.data && r.data.payload) {
      S = r.data.payload;
      S.top3.forEach(function(t,i){ if(!t.id) t.id=i+1; });
      if (!S.tomorrowPlan) S.tomorrowPlan = [];
      if (!S.lastBattleDate) S.lastBattleDate = todayStr();
      if (S.completedLog) completedLog = S.completedLog;
      // migrate Comm -> $$ in all section column arrays
      if(S.sections)Object.keys(S.sections).forEach(function(k){var sec=S.sections[k];if(sec.columns)sec.columns=sec.columns.map(function(c){return c==='Comm'?'$$':c;});});
      // migrate: ensure battlePlan items have comm + person + deal fields
      if(S.battlePlan)S.battlePlan.forEach(function(b){if(!b.comm)b.comm='';if(!b.person)b.person='';if(!b.deal)b.deal='';});
      // migrate: ensure tomorrowPlan items have comm field
      if(S.tomorrowPlan)S.tomorrowPlan.forEach(function(b){if(!b.comm)b.comm='';});
      // migrate: delete pitch and pending sections if present (use new section order)
      if(S.sections&&S.sections.pitch) delete S.sections.pitch;
      if(S.sections&&S.sections.pending) delete S.sections.pending;
      // migrate: rename section labels to new names
      if(S.sections){
        if(S.sections.ehvp&&S.sections.ehvp.label&&S.sections.ehvp.label.indexOf('ALWAYS FIRST')>-1)S.sections.ehvp.label='👑 EHVP';
        if(S.sections.collect&&S.sections.collect.label&&S.sections.collect.label.indexOf('COLLECT NOW')>-1)S.sections.collect.label='🚨 ACCOUNTS RECEIVABLE';
        if(S.sections.active&&S.sections.active.label&&S.sections.active.label.indexOf('HIGHEST COMMISSION')>-1)S.sections.active.label='🔥 ACTIVE DEALS';
        if(S.sections.personal&&S.sections.personal.label&&S.sections.personal.label.indexOf('URGENT')>-1)S.sections.personal.label='🔴 PERSONAL';
      }
      setSyncStatus('ok');
    } else { await saveToCloud(); }
  } catch(e) { console.warn(e); setSyncStatus('err'); }
  handleDailyRollover();
  renderOnly();
  setInterval(autoPurgePastTimeBlocks, 60000);
    setInterval(autoPurgeSchedule, 60000);
    autoPurgeSchedule();
}
async function saveToCloud() {
  setSyncStatus('saving');
  S.completedLog = completedLog;
  try {
    var r = await sb.from('warroom').upsert({id:'bigmatt',payload:S,updated_at:new Date().toISOString()});
    if (r.error) throw r.error;
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('err'); }
}
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToCloud, 1200); }
function forceSave() { saveToCloud(); }
function setSyncStatus(s) {
  var el = document.getElementById('sync-status'); if (!el) return;
  el.className = 'sync '+s;
  el.textContent = s==='ok'?'● Live':s==='saving'?'⟳ Saving…':'✕ Offline';
}

}

// ── DRAG ──────────────────────────────────────────────────────────────────────
function getArr(lt, key) {
  if(lt==='top3') return S.top3;
  if(lt==='battle') return S.battlePlan;
  if(lt==='timeblock') return S.timeBlocks;
  return S.sections[key].rows;
}
function startDrag(e, lt, key, idx) {
  e.preventDefault(); e.stopPropagation();
  var arr=getArr(lt,key), handle=e.currentTarget, row=handle.closest('[data-drag-row]');
  if(!row) return;
  var rect=row.getBoundingClientRect(), clone=row.cloneNode(true);
  clone.style.cssText='position:fixed;pointer-events:none;z-index:99998;width:'+rect.width+'px;left:'+rect.left+'px;top:'+rect.top+'px;margin:0;opacity:0.9;box-shadow:0 8px 32px rgba(0,0,0,0.8);border-radius:6px;background:#1a1a2a;';
  document.body.appendChild(clone);
  row.classList.add('drag-ghost');
  var cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  drag={lt:lt,key:key,curIdx:idx,arr:arr,clone:clone,ghostRow:row,ox:cx-rect.left,oy:cy-rect.top};
  document.addEventListener('mousemove',onDragMove,{passive:false});
  document.addEventListener('mouseup',onDragEnd);
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd);
}
function onDragMove(e) {
  if(!drag) return; e.preventDefault();
  var cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  drag.clone.style.left=(cx-drag.ox)+'px'; drag.clone.style.top=(cy-drag.oy)+'px';
  drag.clone.style.display='none';
  var el=document.elementFromPoint(cx,cy); drag.clone.style.display='';
  if(!el) return;
  var row=el.closest('[data-drag-row][data-drag-lt="'+drag.lt+'"][data-drag-key="'+drag.key+'"]');
  if(!row) return;
  var hoverIdx=parseInt(row.dataset.dragIdx);
  if(isNaN(hoverIdx)||hoverIdx===drag.curIdx) return;
  var item=drag.arr.splice(drag.curIdx,1)[0]; drag.arr.splice(hoverIdx,0,item); drag.curIdx=hoverIdx;
  renderOnly();
  var newRow=document.querySelector('[data-drag-row][data-drag-lt="'+drag.lt+'"][data-drag-key="'+drag.key+'"][data-drag-idx="'+drag.curIdx+'"]');
  if(newRow) newRow.classList.add('drag-ghost');
}
function onDragEnd() {
  if(!drag) return; drag.clone.remove();
  document.removeEventListener('mousemove',onDragMove); document.removeEventListener('mouseup',onDragEnd);
  document.removeEventListener('touchmove',onDragMove); document.removeEventListener('touchend',onDragEnd);
  drag=null; renderOnly(); scheduleSave();
}

    upd(function(s){var b=s.battlePlan.find(function(x){return x.id===id;}); if(b)b.done=false;});
    return;
  }
  actionModal = {step:'choose', id:id, action:item.action, comm:item.comm||''};
  renderOnly();
}

// Step 1: user chooses Complete or Follow-Up
function chooseComplete() {
  if(!actionModal) return;
  var id=actionModal.id, action=actionModal.action;
  completedLog.push({id:uid(), action:action, comm:actionModal&&actionModal.comm||'', completedAt:new Date().toISOString()});
  upd(function(s){ s.battlePlan=s.battlePlan.filter(function(x){return x.id!==id;}); });
  actionModal=null; renderOnly(); scheduleSave();
}

function chooseFollowUp() {
  if(!actionModal) return;

  actionModal = {step:'followup', id:actionModal.id, action:actionModal.action, comm:actionModal.comm||'', followupText:''};
  renderOnly();

function submitFollowUp() {
  if(!actionModal) return;
  var id=actionModal.id, origAction=actionModal.action, origComm=actionModal.comm||'';
  var inp=document.getElementById('followup-text-input');
  var customText = inp ? inp.value.trim() : '';

  completedLog.push({id:uid(), action:origAction, completedAt:new Date().toISOString()});
  // Queue follow-up for tomorrow
  if(!S.tomorrowPlan) S.tomorrowPlan=[];
  S.tomorrowPlan.push({id:uid(), done:false, action:customText, flag:'🔁 FOLLOW-UP', ball:'me', comm:origComm||''});
  upd(function(s){ s.battlePlan=s.battlePlan.filter(function(x){return x.id!==id;}); });
  actionModal=null; renderOnly(); scheduleSave();
}

  var item=S.tomorrowPlan ? S.tomorrowPlan.find(function(x){return x.id===id;}) : null;
  if(item) {
    item.done=false;
    S.battlePlan.push({id:uid(), done:false, action:item.action, flag:item.flag||'', ball:item.ball||'me'});
  }
  upd(function(s){ s.tomorrowPlan=(s.tomorrowPlan||[]).filter(function(x){return x.id!==id;}); });
}

// ── TOP 3 ─────────────────────────────────────────────────────────────────────
function rTop3() {
  var rows=S.top3.map(function(item,i){
    var g=(drag&&drag.lt==='top3'&&drag.curIdx===i)?'drag-ghost':'';
    return '<div class="top3-row '+g+'" data-drag-row data-drag-lt="top3" data-drag-key="top3" data-drag-idx="'+i+'">'+
      '<span class="drag-handle" onmousedown="startDrag(event,\'top3\',\'top3\','+i+')" ontouchstart="startDrag(event,\'top3\',\'top3\','+i+')">⠿</span>'+
      ep('t3f'+item.id,item.flag,function(v){var id=item.id;upd(function(s){var t=s.top3.find(function(x){return x.id===id;});if(t)t.flag=v;});})+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-weight:700;font-size:16px">'+ec('t3d'+item.id,item.deal,'#fff',function(v){var id=item.id;upd(function(s){var t=s.top3.find(function(x){return x.id===id;});if(t)t.deal=v;});})+'</div>'+
        '<div style="font-size:13px;margin-top:2px">'+ec('t3w'+item.id,item.why,'#999',function(v){var id=item.id;upd(function(s){var t=s.top3.find(function(x){return x.id===id;});if(t)t.why=v;});})+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
        ec('t3c'+item.id,item.comm,'#4ade80',function(v){var id=item.id;upd(function(s){var t=s.top3.find(function(x){return x.id===id;});if(t)t.comm=v;});})+
        '<button class="del-btn" onclick="upd(function(s){s.top3=s.top3.filter(function(x){return x.id!=='+item.id+'})})">✕</button>'+
      '</div></div>';
  }).join('');
  return '<div class="top3">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
      '<div class="section-title" style="color:#f59e0b">💰 MONEY MOVERS</div>'+
      '<button class="add-btn" style="color:#f59e0b;border:1px solid #f59e0b" onclick="upd(function(s){s.top3.push({id:uid(),flag:\'🔥\',deal:\'New Deal\',why:\'Why this matters\',comm:\'TBD\'})})">➕ Add</button>'+
    '</div>'+rows+'</div>';
}

    }
    var isName=(col==='Person'||col==='Deal'||col==='Item'), color=isName?sec.color:'#e5e5e5';

    cells.join('')+'</tr>';

function submitScheduleModal(){
  var key=addModalKey, sec=S.sections[key], row={id:uid()};
  if(key==='schedule'){
    var dateEl=document.getElementById('mf-date');
    var timeEl=document.getElementById('mf-time');
    var dayEl=document.getElementById('mf-day');
    var eventEl=document.getElementById('mf-event');
    var protEl=document.getElementById('mf-protect');
    // Format date from YYYY-MM-DD to M/D
    var dateVal='';
    if(dateEl&&dateEl.value){
      var parts=dateEl.value.split('-');
      dateVal=parseInt(parts[1])+'/'+parseInt(parts[2]);
    }
    // Format time from HH:MM to H:MM AM/PM
    var timeVal='—';
    if(timeEl&&timeEl.value){
      var tp=timeEl.value.split(':');
      var h=parseInt(tp[0]),m=parseInt(tp[1]);
      var ampm=h>=12?'PM':'AM'; h=h%12||12;
      timeVal=h+':'+(m<10?'0'+m:m)+' '+ampm;
    }
    // Auto-compute day of week from date
    var dayVal='';
    if(dayEl&&dayEl.value) dayVal=dayEl.value;
    else if(dateEl&&dateEl.value){
      var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      dayVal=days[new Date(dateEl.value+'T12:00:00').getDay()];
    }
    row.date=dateVal;
    row.day=dayVal;
    row.time=timeVal;
    row.event=eventEl?eventEl.value:'';
    row.flag='📅';
    row.protect=protEl?protEl.checked:false;
  } else {
    sec.columns.filter(function(c){return c!=='#';}).forEach(function(col){
      var f=col.toLowerCase(), el=document.getElementById('mf-'+f);
      if(el) row[f]=el.value||'';
    });
    if(key==='schedule'){var pc=document.getElementById('mf-protect');row.protect=pc?pc.checked:false;}
  }
  addModalKey=null;
  upd(function(s){s.sections[key].rows.push(row);});
}
