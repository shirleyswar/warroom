<script>
'use strict';
var SUPABASE_URL='https://mtkyyaorvensylrfbhxv.supabase.co';
var SUPABASE_KEY='sb_publishable_qGuGE-6ExwYvFC01eBvV_g_ewDYx77M';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var EMOJIS=['🚨','🔥','👑','💰','⚡','🔨','📞','📧','⏳','✅','❓','📝','🔄','📣','📊','⚖️','🏆','💸','⚠️','🎯'];
var DEAL_TYPES=['','Lease','Sale','Land','Investment','Renewal','Expansion','Assignment','Sublease','Referral'];
var S=null,collapsed={},completedLog=[],winLog=[],completedLogCollapsed=false,winLogCollapsed=false,saveTimer=null,addModalKey=null,actionModal=null,sectionActionModal=null,personalModal=null,emojiTarget=null,epRegistry={},ecSave={},drag=null,dealsCollapsed=false,closedDealsCollapsed=false,blockModalOpen=false;

function parseTime12(s){if(!s)return null;var m=s.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);if(!m)return null;var h=parseInt(m[1]),min=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+min;}
function nowMinutes(){var n=new Date();return n.getHours()*60+n.getMinutes();}
function todayStr(){var d=new Date();return(d.getMonth()+1)+'/'+d.getDate()+'/'+String(d.getFullYear()).slice(2);}
function formatTime(iso){var d=new Date(iso),h=d.getHours(),min=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+(min<10?'0'+min:min)+' '+ap;}
function formatDateGroup(iso){var d=new Date(iso),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}
function uid(){return Date.now()+Math.floor(Math.random()*9999);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function upd(fn){fn(S);renderOnly();scheduleSave();}

// Commission formatting: $xx,xxx on blur
function formatComm(val){
  if(!val)return val;
  var s=String(val).replace(/[^0-9.]/g,'');
  if(!s)return val;
  var n=parseFloat(s);
  if(isNaN(n))return val;
  return'$'+Math.round(n).toLocaleString('en-US');
}
function onCommBlur(el){
  var raw=el.innerText.trim();
  if(raw&&raw!=='TBD'){
    var f=formatComm(raw);
    if(f&&f!==raw)el.innerText=f;
  }
  var id=el.dataset.ecid;
  if(ecSave[id])ecSave[id](el.innerText.trim());
}

// FIX #2: Tab key moves to the next editable cell to the right
function handleEditableKeydown(event){
  if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();event.target.blur();return;}
  if(event.key==='Tab'){
    event.preventDefault();
    event.target.blur();
    // Find the next editable cell in the same row
    var td=event.target.closest('td');
    if(!td)return;
    var tr=td.closest('tr');
    if(!tr)return;
    var tds=Array.from(tr.querySelectorAll('td'));
    var startIdx=tds.indexOf(td);
    if(startIdx===-1)return;
    var direction=event.shiftKey?-1:1;
    for(var i=startIdx+direction;i>=0&&i<tds.length;i+=direction){
      var ed=tds[i].querySelector('.editable, [contenteditable="true"]');
      if(ed){ed.focus();var range=document.createRange();range.selectNodeContents(ed);var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);return;}
      var sel2=tds[i].querySelector('select');
      if(sel2){sel2.focus();return;}
    }
  }
}

function ec(sid,val,color,onSave,extra){ecSave[sid]=onSave;return'<span class="editable" contenteditable="true" style="color:'+color+(extra?';'+extra:'')+'" data-ecid="'+sid+'" onblur="ecBlur(this)" onkeydown="handleEditableKeydown(event)" onclick="event.stopPropagation()">'+esc(val)+'</span>';}
function ecComm(sid,val,onSave){ecSave[sid]=onSave;return'<span class="editable" contenteditable="true" style="color:#4ade80;white-space:nowrap" data-ecid="'+sid+'" onblur="onCommBlur(this)" onkeydown="handleEditableKeydown(event)" onclick="event.stopPropagation()">'+esc(val)+'</span>';}
// Deal name editable — never truncates
function ecDealName(sid,val,color,onSave){ecSave[sid]=onSave;return'<span class="editable deal-name-editable" contenteditable="true" style="color:'+color+'" data-ecid="'+sid+'" onblur="ecBlur(this)" onkeydown="handleEditableKeydown(event)" onclick="event.stopPropagation()">'+esc(val)+'</span>';}
function ecBlur(el){var id=el.dataset.ecid;if(ecSave[id])ecSave[id](el.innerText.trim());}

// Deal type dropdown — no Ball column
function rDealTypeSelect(key,rowId,cur){
  var opts=DEAL_TYPES.map(function(t){return'<option value="'+esc(t)+'" '+(cur===t?'selected':'')+'>'+( t||'— type —')+'</option>';}).join('');
  return'<select class="deal-type-select" onchange="(function(v){upd(function(s){var r=s.sections[\''+key+'\'].rows.find(function(x){return x.id==='+rowId+'});if(r)r.type=v;})})(this.value)">'+opts+'</select>';
}

// FIX #4: Deal dropdown — save value BEFORE re-render so it sticks
function rSectionDealDrop(key,rowId,cur){
  var sorted=(S.deals||[]).slice().sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});
  var opts=sorted.map(function(d){return'<option value="'+esc(d.name)+'" '+(cur===d.name?'selected':'')+'>'+esc(d.name)+'</option>';}).join('');
  return'<select class="section-deal-sel" data-key="'+key+'" data-rowid="'+rowId+'" onchange="handleSectionDealChange(this)"><option value="" '+((!cur||cur==='')?'selected':'')+'>— deal —</option>'+opts+'<option value="__new__">➕ New Deal</option></select>';
}
function handleSectionDealChange(sel){
  var key=sel.dataset.key,rowId=parseInt(sel.dataset.rowid),val=sel.value;
  if(val==='__new__'){
    var n=prompt('New deal name:');
    if(n&&n.trim()){
      if(!S.deals)S.deals=[];
      S.deals.push({id:uid(),name:n.trim(),expanded:false,sqft:'',price:'',contact:'',dealType:'',status:'Active',commission:'',notes:'',keyDates:''});
      var r=S.sections[key].rows.find(function(x){return x.id===rowId;});
      if(r){r.deal=n.trim();r.dealRef=n.trim();}
      renderOnly();scheduleSave();
    }else{renderOnly();}
  }else{
    var r=S.sections[key].rows.find(function(x){return x.id===rowId;});
    if(r){r.deal=val;r.dealRef=val;}
    renderOnly();scheduleSave();
  }

function parseScheduleDate(ds,ts){if(!ds||ds==='—')return null;var yr=new Date().getFullYear(),pts=ds.replace(/—/g,'').trim().split('/');if(pts.length<2)return null;var mo=parseInt(pts[0]),dy=parseInt(pts[1]);if(isNaN(mo)||isNaN(dy))return null;var d=new Date(yr,mo-1,dy);if(ts&&ts!=='—'){var m=ts.trim().match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);if(m){var h=parseInt(m[1]),min=parseInt(m[2]),ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;d.setHours(h,min,0,0);}else d.setHours(23,59,0,0);}else d.setHours(23,59,0,0);return d;}

async function loadFromCloud(){
  try{
    var r=await sb.from('warroom').select('*').eq('id','bigmatt').single();
    if(r.error&&r.error.code!=='PGRST116')throw r.error;
    if(r.data&&r.data.payload){
      S=r.data.payload;
      S.top3.forEach(function(t,i){if(!t.id)t.id=i+1;});
      if(!S.tomorrowPlan)S.tomorrowPlan=[];
      if(!S.lastBattleDate)S.lastBattleDate=todayStr();
      if(S.completedLog)completedLog=S.completedLog;
      // FIX #8: Load win log from cloud — ensure it populates the local variable
      if(S.winLog&&Array.isArray(S.winLog))winLog=S.winLog;
      else{S.winLog=[];winLog=[];}
      if(S.sections)Object.keys(S.sections).forEach(function(k){var sec=S.sections[k];if(sec.columns)sec.columns=sec.columns.map(function(c){return c==='Comm'?'$$':c;});});
      if(!S.closedDeals)S.closedDeals=[];
      if(!S.deals)S.deals=[];
      S.deals.forEach(function(d){if(!d.contact&&d.owner)d.contact=d.owner;if(!d.contact)d.contact='';delete d.owner;delete d.tenant;if(!d.sqft)d.sqft='';if(!d.price)d.price='';if(!d.dealType)d.dealType='';if(!d.status)d.status='Active';if(!d.commission)d.commission='';if(!d.keyDates)d.keyDates='';if(!d.notes)d.notes='';});
      if(S.battlePlan)S.battlePlan.forEach(function(b){if(!b.comm)b.comm='';if(!b.person)b.person='';if(!b.deal)b.deal='';});
      if(S.tomorrowPlan)S.tomorrowPlan.forEach(function(b){if(!b.comm)b.comm='';});
      // MIGRATION: add dealRef to active rows
      if(S.sections&&S.sections.active)S.sections.active.rows.forEach(function(r){if(!r.dealRef)r.dealRef='';});
      // FIX #5: Remove Type column from Active Deals
      if(S.sections&&S.sections.active){
        S.sections.active.columns=S.sections.active.columns.filter(function(c){return c!=='Ball'&&c!=='Type';});
      }
      // MIGRATION: Under Contract — remove Type col
      if(S.sections&&S.sections.contract){
        S.sections.contract.columns=S.sections.contract.columns.filter(function(c){return c!=='Type';});
        S.sections.contract.columns=S.sections.contract.columns.filter(function(c){return c!=='Ball';});
      }
      // MIGRATION: EHVP — remove Ball col
      if(S.sections&&S.sections.ehvp){
        S.sections.ehvp.columns=S.sections.ehvp.columns.filter(function(c){return c!=='Ball';});
      }
      // MIGRATION: HVP — remove Ball col
      if(S.sections&&S.sections.hvp){
        S.sections.hvp.columns=S.sections.hvp.columns.filter(function(c){return c!=='Ball';});
      }
      // MIGRATION: ensure deal field on hvp/ehvp rows
      if(S.sections&&S.sections.hvp)S.sections.hvp.rows.forEach(function(r){if(!r.deal)r.deal='';});
      if(S.sections&&S.sections.ehvp)S.sections.ehvp.rows.forEach(function(r){if(!r.deal)r.deal='';});
      if(S.sections&&S.sections.pitch)delete S.sections.pitch;
      if(S.sections&&S.sections.pending)delete S.sections.pending;
      // Ensure winLog exists on S
      if(!S.winLog)S.winLog=[];
      setSyncStatus('ok');
    }else{await saveToCloud();}
  }catch(e){console.warn(e);setSyncStatus('err');}
  handleDailyRollover();renderOnly();
  setInterval(autoPurgePastTimeBlocks,60000);setInterval(autoPurgeSchedule,60000);autoPurgeSchedule();
}

async function saveToCloud(){
  setSyncStatus('saving');
  S.completedLog=completedLog;
  S.winLog=winLog; // Always save winLog to Supabase
  try{
    var r=await sb.from('warroom').upsert({id:'bigmatt',payload:S,updated_at:new Date().toISOString()});
    if(r.error)throw r.error;
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

function rTimeBlocks(){var rows=S.timeBlocks.map(function(t,i){var g=(drag&&drag.lt==='timeblock'&&drag.curIdx===i)?'drag-ghost':'';return'<div class="time-row '+g+'" data-drag-row data-drag-lt="timeblock" data-drag-key="timeblock" data-drag-idx="'+i+'"><span class="drag-handle" onmousedown="startDrag(event,\'timeblock\',\'timeblock\','+i+')" ontouchstart="startDrag(event,\'timeblock\',\'timeblock\','+i+')">⠿</span><span class="time-label">'+esc(t.time)+'</span><span style="flex:1;font-size:15px">'+ec('tbe'+t.id,t.event,'#e5e5e5',function(v){var id=t.id;upd(function(s){var x=s.timeBlocks.find(function(x){return x.id===id;});if(x)x.event=v;})})+'</span>'+ep('tbf'+t.id,t.flag,function(v){var id=t.id;upd(function(s){var x=s.timeBlocks.find(function(x){return x.id===id;});if(x)x.flag=v;})})+'<button class="del-btn" onclick="upd(function(s){s.timeBlocks=s.timeBlocks.filter(function(x){return x.id!=='+t.id+'})})">✕</button></div>';}).join('');return'<div class="timeblock"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="section-title" style="color:#a78bfa">⏰ TODAY\'S BLOCKS</div><button class="add-btn" style="color:#a78bfa;border:1px solid #a78bfa" onclick="openBlockModal()">➕ Add Block</button></div>'+rows+'</div>';}

function addDeal(name){var dn=name||prompt('Deal ID (address or name):');if(!dn||!dn.trim())return null;var t=dn.trim();if(!S.deals)S.deals=[];if(S.deals.find(function(d){return d.name===t;}))return t;S.deals.push({id:uid(),name:t,expanded:true,sqft:'',price:'',contact:'',dealType:'',status:'Active',commission:'',notes:'',keyDates:''});scheduleSave();return t;}
function toggleDealExpand(id){upd(function(s){var d=s.deals.find(function(x){return x.id===id;});if(d)d.expanded=!d.expanded;});}
function deleteDeal(id){if(!confirm('Delete this deal?'))return;upd(function(s){s.deals=s.deals.filter(function(x){return x.id!==id;});});}
function updateDealField(id,field,val){upd(function(s){var d=s.deals.find(function(x){return x.id===id;});if(d)d[field]=val;});}
function rDealDetail(deal){var fields=[{key:'sqft',label:'SqFt',color:'#e5e5e5',fmt:'sqft'},{key:'price',label:'Price',color:'#4ade80',fmt:'price'},{key:'contact',label:'Contact',color:'#f59e0b',fmt:'text'},{key:'dealType',label:'Deal Type',color:'#c4b5fd',fmt:'text'},{key:'status',label:'Status',color:'#fbbf24',fmt:'text'},{key:'commission',label:'Commission $$',color:'#4ade80',fmt:'comm'},{key:'keyDates',label:'Key Dates',color:'#67e8f9',fmt:'text'},{key:'notes',label:'Notes',color:'#aaa',fmt:'text'}];var cells=fields.map(function(f){var ecId='dl'+deal.id+f.key,val=deal[f.key]||'',cell;if(f.fmt==='comm'){var dv=val;if(!val){var pr=parseFloat(String(deal.price||'').replace(/[^0-9.]/g,''))||0;if(pr>0)dv='$'+Math.round(pr*0.03*0.75).toLocaleString('en-US');}cell=ecComm(ecId,dv,function(v){updateDealField(deal.id,'commission',v);});}else if(f.fmt==='sqft'){var sn=parseInt(String(val).replace(/[^0-9]/g,''))||0,sd=sn>0?sn.toLocaleString('en-US'):'';cell='<span contenteditable="true" style="color:'+f.color+';outline:none;min-width:60px;display:inline-block;cursor:text" onfocus="(function(el){el.innerText=el.innerText.replace(/[^0-9]/g,\'\');})(this)" onblur="(function(el,id){var n=parseInt(el.innerText.replace(/[^0-9]/g,\'\'))||0;el.innerText=n>0?n.toLocaleString(\'en-US\'):\'\';updateDealField(id,\'sqft\',n>0?n.toLocaleString(\'en-US\'):\'\');})(this,'+deal.id+')">'+esc(sd)+'</span>';}else if(f.fmt==='price'){var pn=parseFloat(String(val).replace(/[^0-9.]/g,''))||0,pd=pn>0?'$'+Math.round(pn).toLocaleString('en-US'):'';cell='<span contenteditable="true" style="color:'+f.color+';outline:none;min-width:80px;display:inline-block;cursor:text" onfocus="(function(el){el.innerText=el.innerText.replace(/[^0-9.]/g,\'\');})(this)" onblur="(function(el,id){var n=parseFloat(el.innerText.replace(/[^0-9.]/g,\'\'))||0;var disp=n>0?\'$\'+Math.round(n).toLocaleString(\'en-US\'):\'\';el.innerText=disp;updateDealField(id,\'price\',disp);var d=S.deals.find(function(x){return x.id===id;});if(d&&!d.commission&&n>0){updateDealField(id,\'commission\',\'$\'+Math.round(n*0.03*0.75).toLocaleString(\'en-US\'));renderOnly();}})(this,'+deal.id+')">'+esc(pd)+'</span>';}else{cell=ec(ecId,val,f.color,function(v){var id=deal.id,fk=f.key;updateDealField(id,fk,v);});}return'<div style="min-width:140px"><div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">'+f.label+'</div><div style="background:#111;border:1px solid #222;border-radius:4px;padding:4px 8px;min-height:26px;">'+cell+'</div></div>';}).join('');return'<div style="background:#0a0a0a;border-top:1px solid #222;padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;">'+cells+'</div>';}

function rDeals(){
  if(!S.deals)S.deals=[];
  var isOpen=!dealsCollapsed;
  var sortedDeals=S.deals.slice().sort(function(a,b){return(a.name||'').localeCompare(b.name||'');});
  var dr=sortedDeals.map(function(deal){
    var dp=deal.expanded?rDealDetail(deal):'';
    return'<div style="border:1px solid #2a2000;border-radius:8px;margin-bottom:8px;overflow:hidden;background:#0d0d0d;"><div style="display:flex;align-items:center;gap:8px;padding:10px 14px;"><span style="color:#f59e0b;font-size:16px;cursor:pointer" onclick="toggleDealExpand('+deal.id+')">'+(deal.expanded?'▼':'▶')+'</span><span style="flex:1;font-weight:700;font-size:15px;color:#f59e0b">'+ecDealName('dlname'+deal.id,deal.name,'#f59e0b',function(v){var id=deal.id;upd(function(s){var d=s.deals.find(function(x){return x.id===id;});if(d)d.name=v;})})+'</span>'+(deal.commission?'<span style="font-size:12px;color:#4ade80;font-weight:700;background:#0a2a0a;border:1px solid #166534;border-radius:4px;padding:1px 8px;white-space:nowrap">'+esc(deal.commission)+'</span>':'')+'<span style="font-size:11px;color:#555;background:#111;border:1px solid #222;border-radius:4px;padding:1px 6px;white-space:nowrap">'+esc(deal.status||'Active')+'</span><button onclick="toggleDealExpand('+deal.id+')" style="background:#1a1000;color:#f59e0b;border:1px solid #854d0e;border-radius:4px;padding:2px 8px;font-size:12px;cursor:pointer;white-space:nowrap">'+(deal.expanded?'▲ Hide':'📋 Details')+'</button><button onclick="deleteDeal('+deal.id+')" style="background:none;border:none;color:#333;cursor:pointer;font-size:14px;padding:0 2px;margin-left:4px;">✕</button></div>'+dp+'</div>';
  }).join('');
  return'<div style="background:linear-gradient(135deg,#0d0800,#0d0d0d);border:1px solid #854d0e;border-radius:10px;padding:16px;margin-bottom:20px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><div style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="dealsCollapsed=!dealsCollapsed;renderOnly()"><span style="font-family:Bebas Neue,Impact,sans-serif;font-size:23px;letter-spacing:2px;color:#f59e0b">🗂️ DEALS</span><span style="font-size:12px;background:#1c1400;border:1px solid #854d0e;border-radius:6px;padding:2px 10px;color:#fbbf24;font-weight:700">'+S.deals.length+' deals</span><span style="color:#555;font-size:13px">'+(isOpen?'▼':'▶')+'</span></div><button class="add-btn" style="color:#f59e0b;border:1px solid #f59e0b" onclick="addDeal()">➕ Add Deal</button></div>'+(isOpen?(S.deals.length?dr:'<div style="color:#444;font-size:14px;text-align:center;padding:16px">No deals yet.</div>'):'')+'</div>';
}

// ---- SECTION RENDERING ----
function rSection(key){
  var sec=S.sections[key],open=!collapsed[key];
  // FIX #5: Active Deals — filter out Type from columns at render time too
  var cols=sec.columns;
  if(key==='active')cols=cols.filter(function(c){return c!=='Type';});
  return'<div class="section"><div class="section-header" onclick="toggleSection(\''+key+'\')"><span class="section-label" style="color:'+sec.color+'">'+sec.label+'</span><div style="display:flex;align-items:center;gap:8px">'+(sec.total?'<span class="section-total">'+sec.total+'</span>':'')+'<span class="chevron">'+(open?'▼':'▶')+'</span></div></div>'+(open?'<div><div class="table-wrap"><table><thead><tr><th class="drag-col"></th><th class="del-col">✕</th><th style="width:28px"></th>'+cols.map(function(c){return'<th>'+(c==='$$'?'Commission':c)+'</th>';}).join('')+'</tr></thead><tbody>'+sec.rows.map(function(row,i){return rRow(key,row,i,sec,cols);}).join('')+'</tbody></table></div><div style="margin-top:6px;padding-left:2px"><button class="add-btn" style="color:'+sec.color+';border:1px solid '+sec.color+'" onclick="openAddModal(\''+key+'\')">'+(key==='schedule'?'➕ Add Event':'➕ Add Row')+'</button></div></div>':'')+'</div>';
}

function rRow(key,row,i,sec,cols){
  if(!cols)cols=sec.columns;
  var g=(drag&&drag.lt==='section'&&drag.key===key&&drag.curIdx===i)?'drag-ghost':'';
  var cells=cols.map(function(col){
    var f=col.toLowerCase();
    if(col==='#')return'<td style="color:#555;font-size:14px">'+(i+1)+'</td>';
    if(col==='Ball')return'';
    if(col==='Type')return'<td>'+rDealTypeSelect(key,row.id,row.type||'')+'</td>';
    if(col==='$$')return'<td class="comm" style="white-space:nowrap">'+ecComm(key+'c'+row.id,row.comm,function(v){var k=key,id=row.id;upd(function(s){var r=s.sections[k].rows.find(function(x){return x.id===id;});if(r)r.comm=v;})})+'</td>';
    if(col==='Deal Ref')return'<td>'+rSectionDealDrop(key,row.id,row.dealRef||'')+'</td>';
    if(col==='Flag'){
      var pBtn=(key==='schedule')?'<button style="background:none;border:1px solid '+(row.protect?'#f59e0b':'#333')+';border-radius:4px;cursor:pointer;padding:1px 4px;font-size:14px;margin-left:4px;" title="'+(row.protect?'Protected':'Click to protect')+'" onclick="upd(function(s){var r=s.sections.schedule.rows.find(function(x){return x.id==='+row.id+'});if(r)r.protect=!r.protect;})">'+(row.protect?'🔒':'🔓')+'</button>':'';
      var cBtn=(key==='collect')?'<button onclick="collectPayment(\'collect\','+row.id+')" style="background:#14532d;color:#4ade80;border:1px solid #16a34a;border-radius:5px;padding:2px 8px;font-size:12px;font-weight:700;cursor:pointer;margin-left:6px;white-space:nowrap;">💰 Collected</button>':'';
      return'<td class="flag-cell" style="white-space:nowrap">'+ep(key+'f'+row.id,row.flag,function(v){var k=key,id=row.id;upd(function(s){var r=s.sections[k].rows.find(function(x){return x.id===id;});if(r)r.flag=v;})})+pBtn+cBtn+'</td>';
    }
    // DEAL column in EHVP/HVP — dropdown sorted A-Z
    if(col==='Deal'&&(key==='ehvp'||key==='hvp'))return'<td>'+rSectionDealDrop(key,row.id,row.deal||'')+'</td>';
    // Deal in other sections — use ecDealName (never truncate)
    if(col==='Deal')return'<td>'+ecDealName(key+f+row.id,row[f]||'',sec.color,function(v){var k=key,ff=f,id=row.id;upd(function(s){var r=s.sections[k].rows.find(function(x){return x.id===id;});if(r)r[ff]=v;})})+'</td>';
    var isName=(col==='Person'||col==='Item'),color=isName?sec.color:'#e5e5e5';
    return'<td>'+ec(key+f+row.id,row[f]||'',color,function(v){var k=key,ff=f,id=row.id;upd(function(s){var r=s.sections[k].rows.find(function(x){return x.id===id;});if(r)r[ff]=v;})})+'</td>';
